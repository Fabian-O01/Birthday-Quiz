<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Quiz 🎉</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🎂 Birthday Quiz 🎂</h1>

    <div id="quiz-box">

    </div>
</div>

<script src="script.js"></script>

</html>
